name: mutation

on:
  push:
    paths:
      - "src/ValueObjects/Money.php"
      - "src/Tax/**.php"
      - "src/Numbering/**.php"
      - "src/Audit/ContentHasher.php"
      - "tests/**.php"
      - ".github/workflows/mutation.yml"
      - "composer.json"
  pull_request:
    paths:
      - "src/ValueObjects/Money.php"
      - "src/Tax/**.php"
      - "src/Numbering/**.php"
      - "src/Audit/ContentHasher.php"
      - "tests/**.php"
      - ".github/workflows/mutation.yml"
      - "composer.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: mutation - money, tax, numbering, hash
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, fileinfo, simplexml
          coverage: pcov

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      # Mutation testing proves the test suite actually *detects* defects in the
      # correctness-critical code — integer money math, VAT grouping/rounding,
      # gapless numbering and the immutability hash — rather than merely covering
      # the lines. Scoped to those namespaces; the wider e-invoice/serialization
      # surface is proven by KoSIT parity and feature tests instead.
      #
      # Report-only for now (no --min gate): this run establishes the baseline
      # Mutation Score Indicator. The gate is ratcheted to the achieved floor in
      # a follow-up once the baseline is known.
      # Pest's --class is a single-value option that splits on commas
      # (CliConfiguration: explode(',', ...)); repeated --class flags would let
      # the last one win, so the scope must be one comma-separated list.
      #
      # The suite kills 194/211 mutants (91.94%). The 17 survivors are all
      # equivalent mutants — different code, identical observable behaviour, so
      # no test can distinguish them:
      #   - Totals array_values() spread of an already-list;
      #   - resolver '>' vs '>=' on a period start that is never equal;
      #   - TaxRatePeriod substr() offset/length shifts that the (int) cast and
      #     checkdate()'s year-leniency normalise away;
      #   - Money/TaxRate BCMath scale bumps that the (int) cast / rtrim undo,
      #     and roundToInt's '>= 0' where the '== 0' case rounds to 0 either way;
      #   - numbering firstOrCreate() default ['current_value' => 0] vs the DB
      #     column default of 0.
      # Several sit on lines that ALSO carry killed mutants, so a line-level
      # @pest-mutate-ignore would discard real coverage. Gate at 90% instead: a
      # stable floor above the equivalent-mutant band that fails CI if a genuine
      # test regression drops the score.
      - name: Mutation testing (min 90% on the critical core)
        run: |
          vendor/bin/pest --mutate --parallel --covered-only --min=90 \
            --class="JohnWink\\GobdInvoice\\ValueObjects\\Money,JohnWink\\GobdInvoice\\Tax,JohnWink\\GobdInvoice\\Numbering,JohnWink\\GobdInvoice\\Audit\\ContentHasher"
