name: 💡 Feature Request
description: Suggest an idea or enhancement for gobd-invoice
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to achieve? What is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behaviour you would like.
    validations:
      required: true
  - type: textarea
    id: legal
    attributes:
      label: Legal basis (if compliance-related)
      description: If this concerns a German legal requirement, cite the source (UStG §, BMF letter, KoSIT spec, ...).
